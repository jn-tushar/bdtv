        const video = document.getElementById('video');
        const channelList = document.getElementById('channelList');
        const nowPlaying = document.getElementById('nowPlaying');
        const searchInput = document.getElementById('searchInput');

        let hls = null;
        let currentChannelObj = null;
        let urlIndex = 0;
        let fallbackTimer = null;

        function clearPlayer() {
            if (hls) {
                hls.destroy();
                hls = null;
            }
            video.pause();
            video.removeAttribute('src');
            if (fallbackTimer) {
                clearTimeout(fallbackTimer);
                fallbackTimer = null;
            }
        }

        function attemptLoad() {
            if (!currentChannelObj || urlIndex >= currentChannelObj.urls.length) {
                nowPlaying.innerHTML = '<span style="color:#ef4444;">সব লিংক ব্যর্থ হয়েছে। চ্যানেল পরিবর্তন করুন।</span>';
                return;
            }

            const { url, res } = currentChannelObj.urls[urlIndex];
            nowPlaying.innerHTML = `চেষ্টা করা হচ্ছে: <span style="color: #60a5fa">${currentChannelObj.name}</span> <span class="channel-res" style="background:#374151;">${res}</span>`;

            clearPlayer();

            if (Hls.isSupported()) {
                hls = new Hls({
                    capLevelToPlayerSize: true,
                    maxBufferLength: 30,
                    manifestLoadTimeOut: 10000,
                    levelLoadTimeOut: 10000
                });
                hls.loadSource(url);
                hls.attachMedia(video);

                hls.on(Hls.Events.MANIFEST_PARSED, () => {
                    if (fallbackTimer) clearTimeout(fallbackTimer);
                    video.play().catch(e => console.log("Autoplay error:", e));
                    nowPlaying.innerHTML = `<span style="color: #4ade80;">Play হচ্ছে:</span> ${currentChannelObj.name} <span class="channel-res">${res}</span>`;
                });

                hls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        urlIndex++;
                        attemptLoad();
                    }
                });

                fallbackTimer = setTimeout(() => {
                    urlIndex++;
                    attemptLoad();
                }, 12000);

            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.addEventListener('loadedmetadata', () => {
                    if (fallbackTimer) clearTimeout(fallbackTimer);
                    video.play();
                    nowPlaying.innerHTML = `<span style="color: #4ade80;">Play হচ্ছে:</span> ${currentChannelObj.name} <span class="channel-res">${res}</span>`;
                }, { once: true });
                video.addEventListener('error', () => {
                    urlIndex++;
                    attemptLoad();
                }, { once: true });
                fallbackTimer = setTimeout(() => {
                    urlIndex++;
                    attemptLoad();
                }, 12000);
            } else {
                nowPlaying.innerHTML = '<span style="color:#ef4444;">আপনার ব্রাউজার HLS সাপোর্ট করে না।</span>';
            }
        }

        function loadStream(channelObj) {
            currentChannelObj = channelObj;
            urlIndex = 0;
            attemptLoad();
        }

        function renderChannels(list) {
            channelList.innerHTML = '';
            list.forEach(channel => {
                const div = document.createElement('div');
                div.className = 'channel-item';
                const firstRes = channel.urls[0]?.res || '?';
                div.innerHTML = `<span class="channel-name">${channel.name}</span>
                                 <span class="channel-res">${firstRes}</span>`;
                div.onclick = () => {
                    document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
                    div.classList.add('active');
                    loadStream(channel);
                };
                channelList.appendChild(div);
            });
        }

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = channels.filter(c => c.name.toLowerCase().includes(query));
            renderChannels(filtered);
        });

        document.addEventListener('DOMContentLoaded', () => {
            renderChannels(channels);
            if (channels.length > 0) {
                channelList.firstChild.classList.add('active');
                loadStream(channels[0]);
            }
        });
    </script>
</body>
</html>
